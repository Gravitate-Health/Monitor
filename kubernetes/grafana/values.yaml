
persistence:
  enabled: true
  size: 10Gi
env:
  GF_SERVER_ROOT_URL: "https://gravitate-health.lst.tfo.upm.es/grafana/"
envFromSecret: grafana-email
grafana.ini:
  log:
    mode: console
    level: debug
  server:
    domain: gravitate-health.lst.tfo.upm.es
    root_url: https://gravitate-health.lst.tfo.upm.es/grafana
    serve_from_sub_path: true
    enforce_domain: true
  auth:
    basicAuth:
      enabled: true
  smtp:
    enabled: true
    host: smtp.lst.tfo.upm.es:465
    user: ${FROM_ADDRESS}
# If the password contains # or ; you have to wrap it with triple quotes. Ex """#password;"""
    password: ${PASSWORD}
    from_address: ${FROM_ADDRESS}
    from_name: Gravitate-Health Grafana development
datasources: 
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-server/prometheus
      access: proxy
      isDefault: true

    - name: Loki
      type: loki
      url: http://loki-gateway
      access: proxy
      isDefault: false
plugins:
  #- yesoreyeram-infinity-datasource
dashboardsConfigMaps:
  gh: grafana-dashboards-gh
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
    - name: 'default'
      orgId: 1
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/default
    - name: 'gh'
      orgId: 1
      type: file
      disableDeletion: false
      editable: true
      options:
        path: /var/lib/grafana/dashboards/gh
dashboards:
  #gh:
  #  gh-monit:
  #    file: gh-monit.json
  #  gh-logs:
  #    file: gh-logs.json
  default:
    kubernetes-views-pods:
       gnetId: 15760
       revision: 34
       datasource: Prometheus
    kubernetes-cluster-monitoring:
        gnetId: 315
        revision: 3
        datasource: Prometheus
